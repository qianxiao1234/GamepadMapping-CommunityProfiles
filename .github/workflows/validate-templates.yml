name: Validate Community Templates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Index Integrity
        run: |
          # 重新生成索引以验证 PR 是否篡改或未同步 index.json
          python .scripts/generate_index.py
          
          # 检查 index.json 是否有差异
          if ! git diff --exit-code index.json; then
            echo "-------------------------------------------------------"
            echo "ERROR: index.json is out of date or has been tampered with!"
            echo "Please do not modify index.json manually."
            echo "The index is automatically managed by our system."
            echo "If you added new templates, the index will be updated automatically after merge."
            echo "-------------------------------------------------------"
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run semantic validation
        run: |
          # 对所有 JSON 模板进行深度语义校验
          python .scripts/validate_templates.py . --check-duplicate-profile-ids \
            --incremental-semantic-git "$(git merge-base origin/main HEAD)...HEAD"
